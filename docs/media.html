<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Media</title>
        <script src="script.js"></script>
        <link rel="style.css">
    </head>
    <body>
    <h1>Media Converter</h1>
    <p>Under construction! Add a file and choose what to convert to! Must be compatible, or else it will fail.</p>
    <input type="file" id="fileinput" placeholder="Hey! Add a file here!">
    <select>
        <option value="mp3">mp3</option>
        <option value="wav">wav</option>
        <option value="pdf">pdf</option>
        <option value="jpeg">jpeg</option>
    </select>
    <button>Convert!</button>
    <p id="result">Waiting..</p>
    <button href="index.html">Numeric</button>
    </body>
</html>
